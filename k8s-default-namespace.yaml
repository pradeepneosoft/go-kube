---
# PostgreSQL StatefulSet in default namespace
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  init.sql: |
    SELECT 'CREATE DATABASE user_db' WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'user_db')\gexec
    SELECT 'CREATE DATABASE order_db' WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'order_db')\gexec
    SELECT 'CREATE DATABASE notification_db' WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'notification_db')\gexec

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        volumeMounts:
        - name: storage
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-script
        configMap:
          name: postgres-init-script

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres

---
# Zookeeper StatefulSet
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zk-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
spec:
  serviceName: zookeeper
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
        volumeMounts:
        - name: datadir
          mountPath: /var/lib/zookeeper/data
        livenessProbe:
          tcpSocket:
            port: 2181
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 2181
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: datadir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
spec:
  clusterIP: None
  ports:
  - port: 2181
    targetPort: 2181
  selector:
    app: zookeeper

---
# Kafka StatefulSet
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  clusterIP: None
  ports:
  - port: 9092
    targetPort: 9092
    name: broker
  - port: 29092
    targetPort: 29092
    name: broker-internal
  selector:
    app: kafka

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
spec:
  # NodePort exposes Kafka on a static port on each node (localhost:30092)
  type: NodePort
  ports:
  - port: 9092
    targetPort: 9092
    name: broker
    # Access via: localhost:30092
    nodePort: 30092
  - port: 29092
    targetPort: 29092
    name: broker-internal
  selector:
    app: kafka

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      initContainers:
      - name: wait-zk
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z zookeeper:2181; do echo "Waiting for Zookeeper..."; sleep 2; done']
      
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.5.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9092
          name: broker
        - containerPort: 29092
          name: broker-internal
        
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://$(POD_NAME).kafka:9092,PLAINTEXT_INTERNAL://localhost:29092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT_INTERNAL"
        - name: KAFKA_LOG_DIR
          value: "/var/lib/kafka/data/logs"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        - name: KAFKA_DEFAULT_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_MIN_INSYNC_REPLICAS
          value: "1"
        - name: KAFKA_NUM_NETWORK_THREADS
          value: "4"
        - name: KAFKA_NUM_IO_THREADS
          value: "4"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "24"
        - name: KAFKA_LOG_SEGMENT_BYTES
          value: "1073741824"
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512M -Xms256M"
        - name: KAFKA_JVM_PERFORMANCE_OPTS
          value: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
        
        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "400m"
          limits:
            memory: "1Gi"
            cpu: "800m"
        
        volumeMounts:
        - name: datadir
          mountPath: /var/lib/kafka/data
      
      terminationGracePeriodSeconds: 60
  
  volumeClaimTemplates:
  - metadata:
      name: datadir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

---
# User Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
      - name: wait-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z postgres:5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      
      containers:
      - name: user-service
        image: go-kube-user-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 50051
        env:
        - name: USER_SERVICE_GRPC_PORT
          value: "50051"
        - name: USER_SERVICE_DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/user_db"
        livenessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  # NodePort exposes the service on a static port on each node (localhost:30051)
  type: NodePort
  ports:
  - port: 50051
    targetPort: 50051
    # Access via: localhost:30051
    nodePort: 30051
  selector:
    app: user-service

---
# Order Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
      - name: wait-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z postgres:5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      - name: wait-kafka
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z kafka-bootstrap:9092; do echo "Waiting for Kafka..."; sleep 2; done']
      - name: wait-user
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z user-service:50051; do echo "Waiting for User Service..."; sleep 2; done']
      
      containers:
      - name: order-service
        image: go-kube-order-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 50052
        env:
        - name: ORDER_SERVICE_GRPC_PORT
          value: "50052"
        - name: ORDER_SERVICE_DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/order_db"
        - name: USER_SERVICE_GRPC_ADDR
          value: "user-service:50051"
        - name: KAFKA_BROKERS
          value: "kafka-bootstrap:9092"
        livenessProbe:
          tcpSocket:
            port: 50052
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 50052
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  # NodePort exposes the service on a static port on each node (localhost:30052)
  type: NodePort
  ports:
  - port: 50052
    targetPort: 50052
    # Access via: localhost:30052
    nodePort: 30052
  selector:
    app: order-service

---
# Notification Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
      - name: wait-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z postgres:5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      - name: wait-kafka
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z kafka-bootstrap:9092; do echo "Waiting for Kafka..."; sleep 2; done']
      
      containers:
      - name: notification-service
        image: go-kube-notification-service:latest
        imagePullPolicy: Never
        env:
        - name: KAFKA_BROKERS
          value: "kafka-bootstrap:9092"
        - name: KAFKA_CONSUMER_GROUP
          value: "notification-service"
        - name: NOTIFICATION_SERVICE_DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/notification_db"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -f /app/notification-service
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -f /app/notification-service
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: notification-service
