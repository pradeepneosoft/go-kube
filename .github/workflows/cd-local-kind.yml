name: CD Local kind

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
      - master
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to local kind
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to kind
        run: bash scripts/deploy-local-kind.sh
