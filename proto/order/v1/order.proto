syntax = "proto3";

package order.v1;

option go_package = "github.com/pradeepneosoft/go-kube/gen/proto/order/v1;orderv1";

message Order {
  string id = 1;
  string user_id = 2;
  string product_name = 3;
  int32 quantity = 4;
  string status = 5;
  string created_at = 6;
}

message CreateOrderRequest {
  string user_id = 1;
  string product_name = 2;
  int32 quantity = 3;
}

message GetOrderRequest {
  string id = 1;
}

message ListOrdersByUserRequest {
  string user_id = 1;
}

message ListOrdersByUserResponse {
  repeated Order orders = 1;
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (Order);
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc ListOrdersByUser(ListOrdersByUserRequest) returns (ListOrdersByUserResponse);
}
